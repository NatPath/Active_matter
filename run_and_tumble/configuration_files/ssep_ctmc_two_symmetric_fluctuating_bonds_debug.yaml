dim_num: 1
simulation_mode: "ctmc_1d"
correlation_observable_mode: "selected_site_cuts"

# Offsets for tracked site cuts relative to the reference bond used by the light CTMC plot.
# Non-integers are interpreted as fractions of L.
correlation_cut_offsets: [0.125, 0.25]

# Keep L even if you want the bond pair to stay centered naturally.
L: 128
ρ₀: 0.5
D: 1.0
T: 1.0
γ: 0.0

n_sweeps: 10000000
warmup_sweeps: 10000
cluster_mode: false
description: "ctmc_two_symmetric_fluctuating_bonds_debug"

potential_type: "zero"
fluctuation_type: "no-fluctuation"
potential_magnitude: 0.0
ic: "random"

# Two fluctuating bonds inferred symmetrically around the center.
# The code interprets d as the gap between the right site of the left bond
# and the left site of the right bond.
# Do not set forcing_type here; leaving it unset activates the d-based placement.
forcing_distance_d: 16

# Scalars are applied to both bonds.
forcing_magnitude: 1.0
ffr: 1.0
forcing_direction_flags: [true, true]
forcing_fluctuation_type: "alternating_direction"

forcing_rate_scheme: "legacy_penalty"
bond_pass_count_mode: "all_forcing_bonds"

# In CTMC mode one "sweep" here means one unit of physical time.
# show_times: [1, 2, 5, 10, 20, 50, 100, 200, 500, 1000]
save_times: []

plot_final: true
save_final_plot: true
save_dir: "saved_states_ssep_ctmc_two_bonds_debug"
